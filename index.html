<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f1f3f4;
color:#202124;
}

header{
height:70px;
background:white;
display:flex;
align-items:center;
padding:0 25px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
font-size:28px;
font-weight:bold;
color:#1a73e8;
}

.container{
display:grid;
grid-template-columns:250px 1fr;
height:calc(100vh - 70px);
}

.sidebar{
background:white;
padding:20px;
border-right:1px solid #ddd;
}

.sidebar h2{
font-size:18px;
margin-bottom:20px;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
border:none;
border-radius:12px;
background:#f8f9fa;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.sidebar button:hover{
background:#e8f0fe;
transform:translateX(5px);
}

.main{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 6px 15px rgba(0,0,0,0.08);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#5f6368;
}

#secret{
position:fixed;
bottom:8px;
right:10px;
font-size:20px;
opacity:0.08;
cursor:pointer;
user-select:none;
}
</style>
</head>

<body>

<header>Study Portal</header>

<div class="container">

<div class="sidebar">
<h2>Menu</h2>

<button onclick="go('https://classroom.google.com')">Classroom</button>
<button onclick="go('https://docs.google.com')">Docs</button>
<button onclick="go('https://drive.google.com')">Drive</button>
<button onclick="go('https://bbc.co.uk/bitesize')">Revision</button>

</div>

<div class="main">

<div class="card" onclick="go('https://classroom.google.com')">
<h3>Assignments</h3>
<p>Check your homework and tasks.</p>
</div>

<div class="card" onclick="go('https://docs.google.com')">
<h3>Notes</h3>
<p>Create and edit study notes.</p>
</div>

<div class="card" onclick="go('https://youtube.com')">
<h3>Tutorials</h3>
<p>Watch learning videos.</p>
</div>

<div class="card" onclick="go('https://bbc.co.uk/bitesize')">
<h3>Revision</h3>
<p>Prepare for tests and exams.</p>
</div>

</div>

</div>

<div id="secret" onclick="go('https://example.com')">•</div>

<script>
function go(url){
window.location.href = url;
}
</script>

</body>
</html>
